<div class="gestion-container">
  <h2 class="section-title">Gestión de Asistencias</h2>
  <p class="section-description">
    Seleccione una categoría para ver el estado de configuración de asistencias en los cursos
  </p>

  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <div *ngIf="isLoading" class="loading-message">
    Cargando categorías...
  </div>

  <div class="categorias-list" *ngIf="!isLoading">
    <ng-container *ngFor="let categoria of categorias">
      <app-categoria-tree [categoria]="categoria" [moodleService]="moodleService"></app-categoria-tree>
    </ng-container>
  </div>
</div>
